<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portfolio Website - Boggarapu Dhanush</title>
</head>
<body>
    <div id="wrapper">
        <div class="container">
            <div class="navbar">

                <div class="logo-container">
                    <img src="name.jpg" class="logo">
                    <div class="logo-text">
                        hanush Boggarapu
                    </div>
                </div>

                <div class="nav-items">
                    <div><a href="#projects">Projects</a></div>
                    <div><a href="#skills">Skills</a></div>
                    <div><a href="#contactme">Contact Me</a></div>
                </div>
            </div>
        </div>
    
    <div class="hero-section">
        <div class="faded-text">Boggarapu Dhanush</div>

        <div class="hero-section-left">
            <div class="hero-section-heading">Hello Everyone</div>

            <div class="hero-section-heading hero-section-sub-heading">
                I am a <span class="role"></span>
            </div>

            <div class="hero-section-description">
                I'm a frontend developer and here is my portfolio website.This is my 
                journey as a software developer.
            </div>

            <div class="btn-pink">Hire Me</div>
        </div>
    
        <div class="hero-section-right">
            <div class="absolute icon icon-dots">
                <img src="dots.png" alt="">
            </div>
            <div class="absolute icon icon-cubes">
                <img src="cube.png" alt="">
            </div>
            <div class="absolute icon icon-circle">
                <img src="circle.png" alt="">
            </div>
            <div class="absolute icon icon-zigzak">
                <img src="zigzags.png" alt="">
            </div>
            <div class="absolute icon icon-plus">
                <img src="plus.png" alt="">
            </div>
            <div class="user-image">
                <img src="profileimg.jpeg" alt="">
            </div>
        </div>


    </div>
    <div class="project-container">
        <h1 class="fade">Projects</h1>
    </div>
    <div class="project">
        <img class="projectimg" src="Capture.JPG" alt="">
        <img class="projectimg" src="Capture1.JPG" alt="">
        <img class="projectimg" src="calc.JPG" alt="">
        <img class="projectimg" src="project3.JPG" alt="">
    </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script>
    <script>
        var typeData = new Typed(".role", {
          strings: [
            "Full Stack Developer",
            "Web Developer",
            "UI-UX Designer",
            "Backend Developer",
            "Coder",
          ],
          loop: true,
          typeSpeed: 100,
          backSpeed: 80,
          backDelay: 1000,
        });
    </script>
</body>
</html>
